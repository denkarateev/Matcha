version: '3.8'

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: matcha
      POSTGRES_USER: matcha
      POSTGRES_PASSWORD: matcha_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matcha -d matcha"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # Redis 7
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------------------------------------------------------
  # FastAPI backend
  # -------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://matcha:matcha_dev@db:5432/matcha
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-prod-use-32-byte-hex
      ENVIRONMENT: development
      ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot-reload in development: mount source code
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
  redis_data:
